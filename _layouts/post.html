---
layout: default
---
<div class="container">
  <h1>{{ page.title }}</h1>

  <time datetime="{{ page.date | date: "%Y-%m-%d" }}">{{ page.date | date_to_string }}</time>
  {% if page.tags.size > 0 %}
    <h5>Thoughts on {{page.tags | array_to_sentence_string}}</h5>
  {% endif %}

  {{ page.excerpt }}

  {{ page.content | remove: page.excerpt }}
</div>
