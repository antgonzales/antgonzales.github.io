<header>
  <div class="container">
    {% if page.url != '/' %}
      <div class="nav-logo">
        <a href="/">Anthony Gonzales, Web Developer</a>
      </div>
    {% endif %}
    <nav role="navigation">
      <ul class="main-nav">
      {% for link in site.data.nav %}
        <li>
          <a href="{{ link.href }}">
            {{ link.title }}
          </a>
        </li>
      {% endfor %}
      </ul>
    </nav>
  </div>
</header>
