---
layout: default
title: Anthony Gonzales, Developer
description: I'm a web developer. Take a look at my skills, get to know me, drop me a line.
---

<div class="container home">
  <ul class="list-reset blog-roll">
    {% for post in site.posts %}
      <li class="blog-roll-post">
        <time class="blog-roll-post-meta italic" datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date_to_string }}</time>
        <h2 class="blog-roll-post-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <p class="blog-roll-excerpt">{{post.excerpt}}</p>
      </li>
    {% endfor %}
  </ul>
</div>
